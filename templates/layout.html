<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillBridge - Bridge Your Skill Gap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    
    <nav class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-bridge text-blue-600 text-xl"></i>
                    <h1 class="text-xl font-bold text-gray-800">SkillBridge</h1>
                </div>
                <div class="text-sm text-gray-600">
                    <span class="hidden md:inline">AI-Powered Career Path Builder</span>
                </div>
            </div>
        </div>
    </nav>

    
    <main class="max-w-4xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

   

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
